
<!DOCTYPE html>
<html>
<head>
<style>
@page { size: A4 landscape; margin: 0; }

body {
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  -webkit-print-color-adjust: exact;
}

/* PAGE */
.page {
  width: 297mm;
  height: 210mm;
  position: relative;
  background: white;
  overflow: hidden;
}

/* GOLD BORDER */
.border {
  position: absolute;
  inset: 12mm;
  border: 2px solid #d4af37;
}

/* INNER FRAME */
.inner {
  position: absolute;
  inset: 18mm;
  border: 1px solid #e5e7eb;
}

/* BACKGROUND */
.bg {
  position: absolute;
  inset: 0;
  background-image: url("file:///X:/certificate-microservice/public/assets/Edu-Learn-01.png");
  background-repeat: no-repeat;
  background-position: center;
  background-size: 60%;
  opacity: 0.07;
}

/* CONTENT */
.content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 0 40mm;
}

/* BRAND */
.brand {
  font-size: 14px;
  letter-spacing: 6px;
  color: #6b7280;
  text-transform: uppercase;
}

/* TITLE */
.title {
  font-size: 44px;
  font-weight: 700;
  color: #111827;
  margin-top: 10px;
}

/* SUBTITLE */
.subtitle {
  font-size: 15px;
  color: #6b7280;
  margin-top: 12px;
}

/* NAME */
.name {
  font-size: 38px;
  font-weight: 700;
  color: #2563eb;
  margin: 18px 0;
  border-bottom: 2px solid #2563eb;
  display: inline-block;
  padding-bottom: 6px;
}

/* COURSE */
.course {
  font-size: 24px;
  font-style: italic;
  color: #16a34a;
  margin-top: 8px;
}

/* DETAILS */
.details {
  margin-top: 18px;
  font-size: 13px;
  color: #4b5563;
}

/* STAMP (BOTTOM LEFT) */
.stamp {
  position: absolute;
  bottom: 25mm;
  left: 25mm;
  z-index: 3;
}

.stamp img {
  width: 130px;
}

/* SIGNATURE (BOTTOM RIGHT) */
.signature {
  position: absolute;
  bottom: 28mm;
  right: 35mm;
  text-align: center;
}

/* EDU LOGO ABOVE SIGNATURE */
.edu-logo {
  margin-bottom: 6px;
}

.edu-logo img {
  width: 150px;
  height: auto;
}


.line {
  width: 160px;
  border-top: 1px solid #111827;
  margin-bottom: 6px;
}
</style>
</head>

<body>

<div class="page">

  <div class="border"></div>
  <div class="inner"></div>
  <div class="bg"></div>

  <div class="content">

    <div class="brand">EDULEARN ACADEMY</div>

    <div class="title">Certificate of Completion</div>

    <div class="subtitle">This is to certify that</div>

    <div class="name">uzma Khan</div>

    <div class="subtitle">has successfully completed the course</div>

    <div class="course">Full Stack Web Development</div>

    <div class="details">
      Certificate ID: <b>undefined</b><br/>
      Date: <b>5/2/2026</b>
    </div>

  </div>

  <!-- STAMP -->
  
  <div class="stamp">
    <img src="file:///X:/certificate-microservice/public/assets/upload.png" />
  </div>
  

  <!-- SIGNATURE + EDU -->
  <div class="signature">

    
    <div class="edu-logo">
      <img src="file:///X:/certificate-microservice/public/assets/EDU.png" />
    </div>
    

    <div class="line"></div>
    <div style="font-size:12px;color:#6b7280;">Authorized Signature</div>

  </div>

</div>

</body>
</html>
