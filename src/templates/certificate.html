const certificateTemplate = (data) => `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
@page {
  size: A4 landscape;
  margin: 0;
}

body {
  margin: 0;
  font-family: "Helvetica", Arial, sans-serif;
  background: #f5f7fb;
}

/* OUTER BORDER */
.page {
  width: 297mm;
  height: 210mm;
  background: white;
  position: relative;
  box-sizing: border-box;
  padding: 18mm;
}

/* INNER BORDER (Coursera style) */
.frame {
  width: 100%;
  height: 100%;
  border: 2px solid #1f2a44;
  position: relative;
  padding: 20mm;
  box-sizing: border-box;
}

/* TOP BRAND */
.brand {
  font-size: 14px;
  letter-spacing: 3px;
  color: #1f2a44;
  text-transform: uppercase;
  font-weight: 600;
}

/* TITLE */
.title {
  font-size: 42px;
  font-weight: 700;
  margin-top: 30px;
  color: #1f2a44;
  letter-spacing: 2px;
}

/* SUB TEXT */
.sub {
  font-size: 16px;
  color: #666;
  margin-top: 10px;
}

/* NAME (BIG FEATURE LIKE UDEMY) */
.name {
  font-size: 34px;
  margin-top: 30px;
  font-weight: 700;
  color: #0f172a;
  border-bottom: 2px solid #2563eb;
  display: inline-block;
  padding-bottom: 6px;
}

/* COURSE */
.course {
  font-size: 24px;
  margin-top: 20px;
  color: #2563eb;
  font-style: italic;
}

/* DETAILS */
.details {
  margin-top: 25px;
  font-size: 14px;
  color: #444;
}

/* FOOTER SIGNATURE AREA */
.footer {
  position: absolute;
  bottom: 20mm;
  width: calc(100% - 40mm);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* SIGNATURE BLOCK */
.sign {
  text-align: center;
}

.line {
  width: 180px;
  border-top: 1px solid #111;
  margin-bottom: 5px;
}

/* QR */
.qr img {
  width: 90px;
  height: 90px;
  border: 1px solid #ddd;
  padding: 5px;
}
</style>
</head>

<body>
  <div class="page">
    <div class="frame">

      <div class="brand">EDULEARN ACADEMY</div>

      <div class="title">Certificate of Completion</div>

      <div class="sub">This is to certify that</div>

      <div class="name">${data.studentName}</div>

      <div class="sub">has successfully completed the course</div>

      <div class="course">${data.courseTitle}</div>

      <div class="details">
        Certificate ID: <b>${data.certificateId}</b><br/>
        Date of Completion: <b>${data.completionDate}</b>
      </div>

      <div class="footer">

        <div class="sign">
          <div class="line"></div>
          <div style="font-size:12px;">Authorized Signature</div>
        </div>

        <div class="qr">
          <img src="${data.qrCodeUrl}" />
        </div>

      </div>

    </div>
  </div>
</body>
</html>
`;
